name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit and integration tests (Layer 1)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      # Layer 1 only: headless and deterministic. The XCUITest suite (Layer 2,
      # `make uitest`) takes over input focus and runs locally, not in CI.
      - name: Run unit and integration tests
        run: make test
